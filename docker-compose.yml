version: "3.9"

# Multi-source file scanner — full stack:
#   web (Next.js) <-> api (FastAPI) <-> postgres / redis
#                          \-> worker (Celery) -> { clamav, yara, VT/MD/HA APIs }

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scanner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scanner_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-scanner}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scanner}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  clamav:
    image: clamav/clamav:stable
    restart: unless-stopped
    environment:
      CLAMAV_NO_FRESHCLAMD: "false"   # let freshclam keep sigs up to date
      FRESHCLAM_CHECKS: "24"          # 24 update checks/day
    volumes:
      - clamav_data:/var/lib/clamav   # persistent signature DB
    healthcheck:
      test: ["CMD-SHELL", "echo PING | nc -w 2 localhost 3310 | grep -q PONG"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 180s              # initial sig download takes a while

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-scanner}:${POSTGRES_PASSWORD:-scanner_dev_pw}@postgres:5432/${POSTGRES_DB:-scanner}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY required}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-209715200}
      ENGINES_CONFIG: /app/engines.json
      STORAGE_DIR: /storage
      ALLOWED_ORIGINS: ${PUBLIC_API_URL:-http://localhost:3000}
      # API keys (used by worker, but also by /api/engines for surface info)
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY:-}
      METADEFENDER_API_KEY: ${METADEFENDER_API_KEY:-}
      HYBRID_ANALYSIS_API_KEY: ${HYBRID_ANALYSIS_API_KEY:-}
    volumes:
      - ./storage:/storage
      - ./backend/engines.json:/app/engines.json:ro
      - ./backend/rules:/rules:ro
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2", "--proxy-headers"]

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-scanner}:${POSTGRES_PASSWORD:-scanner_dev_pw}@postgres:5432/${POSTGRES_DB:-scanner}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY required}
      ENGINES_CONFIG: /app/engines.json
      STORAGE_DIR: /storage
      YARA_RULES_DIR: /rules
      CLAMD_HOST: clamav
      CLAMD_PORT: "3310"
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY:-}
      METADEFENDER_API_KEY: ${METADEFENDER_API_KEY:-}
      HYBRID_ANALYSIS_API_KEY: ${HYBRID_ANALYSIS_API_KEY:-}
    volumes:
      - ./storage:/storage
      - ./backend/engines.json:/app/engines.json:ro
      - ./backend/rules:/rules:ro
    depends_on:
      - api
      - redis
      - clamav
    command: ["celery", "-A", "app.workers.celery_app.celery", "worker", "--loglevel=info", "--concurrency=4"]

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_WS_URL: ${PUBLIC_WS_URL:-ws://localhost:8000}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_URL: ${PUBLIC_WS_URL:-ws://localhost:8000}
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - api

  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/tls:/etc/nginx/tls:ro
    depends_on:
      - api
      - web

volumes:
  postgres_data:
  redis_data:
  clamav_data:
