version: "3.9"

# Multi-AV malware scanner — docker-compose for the host-side services.
#
# IMPORTANT: This compose file only orchestrates web/api/queue/db.
# The actual scanning VMs (Windows Defender, Kaspersky, BitDefender, etc.)
# run on the VMware host alongside this stack and are reached over a private
# bridged network. See vm-scripts/README.md for VM provisioning.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scanner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scanner_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-scanner}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scanner}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-scanner}:${POSTGRES_PASSWORD:-scanner_dev_pw}@postgres:5432/${POSTGRES_DB:-scanner}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY required}
      VM_AGENT_TOKEN: ${VM_AGENT_TOKEN:?VM_AGENT_TOKEN required}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-209715200}
      ENGINES_CONFIG: /app/engines.json
      STORAGE_DIR: /storage
    volumes:
      - ./storage:/storage
      - ./backend/engines.json:/app/engines.json:ro
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2", "--proxy-headers"]

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-scanner}:${POSTGRES_PASSWORD:-scanner_dev_pw}@postgres:5432/${POSTGRES_DB:-scanner}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY required}
      VM_AGENT_TOKEN: ${VM_AGENT_TOKEN:?VM_AGENT_TOKEN required}
      VMRUN_PATH: ${VMRUN_PATH:-/usr/bin/vmrun}
      ENGINES_CONFIG: /app/engines.json
      STORAGE_DIR: /storage
    volumes:
      - ./storage:/storage
      - ./backend/engines.json:/app/engines.json:ro
    depends_on:
      - api
      - redis
    command: ["celery", "-A", "app.workers.celery_app.celery", "worker", "--loglevel=info", "--concurrency=8"]

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_URL: ${PUBLIC_WS_URL:-ws://localhost:8000}
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
